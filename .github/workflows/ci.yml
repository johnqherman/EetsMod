name: build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-loader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build native loader
        run: make -C native
      - name: Compile sample mods the way the loader does
        run: ./tools/check-mod.sh native/examples/*.cpp
      - name: API reference is up to date
        run: |
          ./tools/gen-api-ref.sh
          git diff --exit-code docs/NATIVE_API.md || {
            echo "docs/NATIVE_API.md is stale; run tools/gen-api-ref.sh and commit"; exit 1; }
      - name: Upload loader artifact
        uses: actions/upload-artifact@v5
        with:
          name: libeetsmod.so
          path: native/build/libeetsmod.so
